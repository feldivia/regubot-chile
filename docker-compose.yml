# Docker Compose para desarrollo local únicamente.
# En Railway, cada servicio se despliega por separado.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: regbot
      POSTGRES_PASSWORD: regbot
      POSTGRES_DB: regbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
